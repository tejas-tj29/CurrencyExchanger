name: Deploy React Site to Pages

on:
  push:
    branches: ["main"] # Triggers every time you push code to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Safely installs your package.json items in the cloud

      - name: Compile React Production Build
        run: npm run build # Generates your fresh dist folder in the cloud

      - name: Setup GitHub Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Compiled Dist Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Tells GitHub to serve your compiled React code!

      - name: Deploy to GitHub Pages Live Servers
        id: deployment
        uses: actions/deploy-pages@v4